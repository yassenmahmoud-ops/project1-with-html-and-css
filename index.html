<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>log</title>
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <main id="main">
      <div class="contact-us">
        <div class="contact">
          <h2>Contact Us</h2>
          <p>
            Feel free to reach out for any inquiries or feedback. We are here to
            help.
          </p>
          <form>
            <input type="text" name="Name" id="name" placeholder="Your Name" />
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Your email"
            />
            <textarea
              name="message"
              id="message"
              rows="6"
              placeholder="Your Message"
            ></textarea>
            <button type="submit" class="btn-submit">Send Message</button>
          </form>
          <div class="social">
            <a href="#" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" aria-label="Google"><i class="fa-brands fa-google"></i></a>
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
          </div>
        </div>
        <div class="map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d109203.17162928579!2d31.5141949!3d31.204127!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f77b210a2f44ef%3A0x5eadfa5cd5866cb1!2z2YXYs9iq2LTZgdmJINmI2YXYudmH2K8g2KjYrdmI2Ksg2KfZhNmD2KjYryDYp9mE2YXYtdix2Yo!5e0!3m2!1sar!2seg!4v1770716239872!5m2!1sar!2seg"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Office location"
          ></iframe>
        </div>
      </div>
    </main>
  </body>
</html>
